<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap');

  :root {
    --bg: #0f0f13;
    --card: #1a1a22;
    --accent: #00e5ff;
    --accent2: #ff4d6d;
    --text: #e8e8f0;
    --muted: #6b6b80;
    --border: #2a2a38;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    padding: 32px 24px;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 5vw, 48px);
    font-weight: 800;
    letter-spacing: -1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  header p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 16px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    cursor: pointer;
    animation: fadeUp 0.4s ease both;
  }

  .card:hover {
    transform: translateY(-4px);
    border-color: var(--accent);
    box-shadow: 0 8px 32px rgba(0, 229, 255, 0.15);
  }

  .card-label {
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .qr-wrap {
    background: #fff;
    border-radius: 8px;
    padding: 8px;
    width: 140px;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-wrap img {
    width: 124px;
    height: 124px;
    display: block;
  }

  .card-url {
    font-size: 9px;
    color: var(--muted);
    text-align: center;
    word-break: break-all;
    line-height: 1.4;
  }

  .btn-print {
    display: block;
    margin: 40px auto 0;
    background: linear-gradient(135deg, var(--accent), #007acc);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 14px 36px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
    transition: opacity 0.2s;
  }
  .btn-print:hover { opacity: 0.85; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media print {
    body { background: #fff; padding: 12px; }
    header h1 { -webkit-text-fill-color: #000; color: #000; }
    header p { color: #555; }
    .card { border-color: #ccc; animation: none; break-inside: avoid; }
    .card-label { color: #007acc; }
    .card-url { color: #888; }
    .btn-print { display: none; }
  }
</style>
</head>
<body>

<header>
  <h1>📽 QR — Proyectores</h1>
  <p>29 códigos · sin caducidad · escanea y accede</p>
</header>

<div class="grid" id="grid"></div>

<button class="btn-print" onclick="window.print()">🖨 Imprimir todos</button>

<script>
const BASE = "https://brunov2.github.io/QR-Proyectores.github.io/proyector.html?proyector=P-";
const QR_API = "https://api.qrserver.com/v1/create-qr-code/?size=248x248&ecc=M&data=";

const grid = document.getElementById("grid");

for (let i = 1; i <= 29; i++) {
  const num = String(i).padStart(2, "0");
  const url = BASE + num;
  const label = `P-${num}`;

  const card = document.createElement("div");
  card.className = "card";
  card.style.animationDelay = `${i * 30}ms`;
  card.title = `Abrir ${label}`;
  card.onclick = () => window.open(url, "_blank");

  const lbl = document.createElement("div");
  lbl.className = "card-label";
  lbl.textContent = `PROYECTOR ${label}`;

  const wrap = document.createElement("div");
  wrap.className = "qr-wrap";

  const img = document.createElement("img");
  img.src = QR_API + encodeURIComponent(url);
  img.alt = label;
  img.loading = "lazy";

  wrap.appendChild(img);

  const urlDiv = document.createElement("div");
  urlDiv.className = "card-url";
  urlDiv.textContent = url;

  card.appendChild(lbl);
  card.appendChild(wrap);
  card.appendChild(urlDiv);
  grid.appendChild(card);
}
</script>
</body>
</html>
