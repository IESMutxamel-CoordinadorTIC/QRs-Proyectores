<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Proyectores</title>
<style>
  body { 
    font-family: 'Inter', 'Segoe UI', Arial, sans-serif; 
    background: #e0e5ec; 
    padding: 20px; 
    margin: 0;
    color: #444;
  }
  
  h1 { 
    font-weight: 900;
    color: #31344b; 
    text-shadow: 2px 2px 4px rgba(0,0,0,0.05); 
    text-align: center; 
    margin-bottom: 40px;
    letter-spacing: -1px;
  }

  .grupo-marca h2 { 
    font-size: 2.5em; 
    color: #31344b; 
    margin-bottom: 5px; 
    font-weight: 900;
  }
  
  .grupo-marca hr { 
    border: none;
    border-top: 4px solid #babecc; 
    opacity: 0.3; 
    width: 50px;
    margin: 0 0 25px 0;
    border-radius: 10px;
  }

  .grupo-modelo h3 {
    font-size: 1.1em;
    color: #7a7d91;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 15px;
  }

  .cards-fila { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 25px; 
  }

  .card {
    background: #e0e5ec;
    border-radius: 30px;
    padding: 25px;
    /* Sombras base */
    box-shadow: 9px 9px 16px rgb(163,177,198,0.6), 
                -9px -9px 16px rgba(255,255,255, 0.6);
    border: none;
    transition: all 0.2s ease;
  }

  /* Efecto de pulsación al tocar (se hunde) */
  .card:active {
    box-shadow: inset 4px 4px 8px #babecc, 
                inset -4px -4px 8px #fff;
    transform: scale(0.98);
  }

  .card strong { 
    color: #31344b; 
    font-size: 1.3em; 
    display: block;
    margin-bottom: 10px;
    font-weight: 800;
  }

  .card p { 
    color: #61677c; 
    font-weight: 600; 
    margin: 8px 0;
    font-size: 0.9em;
  }

  .card .incidencia {
    color: #e74c3c;
    font-size: 0.85em;
    margin-top: 10px;
    padding: 10px;
    background: #e0e5ec;
    border-radius: 15px;
    box-shadow: inset 2px 2px 5px #babecc, inset -2px -2px 5px #fff;
  }
  
  .card a {
    margin-top: 20px; 
    display: block;
    text-align: center;
    color: #3498db; 
    font-weight: 800; 
    text-decoration: none;
    padding: 12px; 
    border-radius: 20px;
    /* Botón tipo botón neumórfico */
    box-shadow: 6px 6px 10px #babecc, 
                -6px -6px 10px #fff;
    transition: 0.2s;
  }

  .card a:active {
    box-shadow: inset 2px 2px 5px #babecc, 
                inset -2px -2px 5px #fff;
  }
</style>
</head>
<body>
<h1>Lista de Proyectores</h1>
<div id="lista"></div>

<script>
fetch("proyectores.json")
  .then(res => res.json())
  .then(data => {
    const contenedor = document.getElementById("lista");

    const porMarca = {};
    data.forEach(p => {
      const marca = (p.marca || "Sin marca").replace(/^Benq$/i, "BenQ");
      const modelo = p.modelo || "Sin modelo";
      if (!porMarca[marca]) porMarca[marca] = {};
      if (!porMarca[marca][modelo]) porMarca[marca][modelo] = [];
      porMarca[marca][modelo].push(p);
    });

    let html = "";

    for (const marca in porMarca) {
      html += `<div class="grupo-marca">`;
      html += `<h2>${marca}</h2><hr>`;

      for (const modelo in porMarca[marca]) {
        html += `<div class="grupo-modelo">`;
        html += `<h3>${modelo}</h3>`;
        html += `<div class="cards-fila">`;

        porMarca[marca][modelo].forEach(p => {
          const url = `proyector.html?proyector=${p.id}`;

          const horas   = p.horas       ? `<p>⏱ ${p.horas}</p>` : "";
          const res     = p.resolucion  ? `<p>📐 ${p.resolucion}</p>` : "";
          const conex   = p.conexiones  ? `<p>🔌 ${p.conexiones}</p>` : "";
          const noDisp  = p.precio === "PRODUCTO NO DISPONIBLE"
                          ? `<p style="color:#e67e22;font-weight:bold;">⚠ No disponible</p>` : "";
          const incid   = p.incidencia  ? `<p class="incidencia">⚠ ${p.incidencia}</p>` : "";

          html += `
            <div class="card">
              <strong>${p.id}</strong>
              ${horas}
              ${res}
              ${conex}
              ${noDisp}
              ${incid}
              <a href="${url}">Ver detalles →</a>
            </div>
          `;
        });

        html += `</div></div>`;
      }

      html += `</div>`;
    }

    contenedor.innerHTML = html;
  });
</script>
</body>
</html>
